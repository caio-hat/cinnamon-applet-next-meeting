<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 96" width="440" height="96" role="img" aria-label="Next Meeting logo">
  <title>Next Meeting</title>
  <defs>
    <linearGradient id="lg-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
    <radialGradient id="lg-glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lg-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#f4511e"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded tile + clock + next-event dot -->
  <g transform="translate(4 4)">
    <rect x="0" y="0" width="88" height="88" rx="20" ry="20" fill="url(#lg-tile)"/>
    <rect x="0" y="0" width="88" height="88" rx="20" ry="20" fill="url(#lg-glow)"/>

    <!-- Clock ring -->
    <circle cx="44" cy="44" r="26" fill="none" stroke="#ffffff" stroke-width="3.6" stroke-opacity="0.96"/>

    <!-- Hour ticks 12 / 3 / 6 / 9 -->
    <g fill="#ffffff" fill-opacity="0.92">
      <rect x="42.4" y="14"  width="3.2" height="6" rx="1.6"/>
      <rect x="68"   y="42.4" width="6"   height="3.2" rx="1.6"/>
      <rect x="42.4" y="68"   width="3.2" height="6" rx="1.6"/>
      <rect x="14"   y="42.4" width="6"   height="3.2" rx="1.6"/>
    </g>

    <!-- Subtle minute marks between hours (every 30°) -->
    <g fill="#ffffff" fill-opacity="0.42">
      <circle cx="59" cy="18.5" r="1.1"/>
      <circle cx="69.5" cy="29"  r="1.1"/>
      <circle cx="69.5" cy="59"  r="1.1"/>
      <circle cx="59"   cy="69.5" r="1.1"/>
      <circle cx="29"   cy="69.5" r="1.1"/>
      <circle cx="18.5" cy="59"   r="1.1"/>
      <circle cx="18.5" cy="29"   r="1.1"/>
      <circle cx="29"   cy="18.5" r="1.1"/>
    </g>

    <!-- Minute hand pointing to the "next event" dot (~1:30 position) -->
    <line x1="44" y1="44" x2="60" y2="28"
          stroke="#ffffff" stroke-width="4.2" stroke-linecap="round"/>

    <!-- Center pivot -->
    <circle cx="44" cy="44" r="3" fill="#ffffff"/>

    <!-- "Next event" accent dot (warm = imminence) with white halo -->
    <circle cx="62" cy="26" r="7.6" fill="url(#lg-accent)"/>
    <circle cx="62" cy="26" r="7.6" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, -apple-system, system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" fill="#1e293b">
    <text x="112" y="50" font-size="30" font-weight="700" letter-spacing="-0.5">Next Meeting</text>
    <text x="113" y="72" font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.4">any ICS calendar · Cinnamon applet</text>
  </g>
</svg>
